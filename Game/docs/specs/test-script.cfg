# InvaderGame テストスクリプト設定
#
# 書式:
#   event <frame> <action>   : 指定フレームでボタン入力を注入
#   expect <log_entry>       : テスト後に debug.log に存在すべき文字列
#   # で始まる行はコメント（空行は無視）
#
# アクション名: left, right, shoot, pause, quit, enter, debugKillAll
#
# フレームタイムライン:
#   Frame  65: Titleクールダウン(30f) + 待機(35f) → Enter で GameScene へ
#   Frame 130: Gameクールダウン(30f) + 待機(34f) → 射撃
#   Frame 145: デバッグ全滅                        → スコア加算検証
#   Frame 160: Qキー                               → TitleScene へ戻る
#   Frame 260: Qキー                               → ゲーム終了・exe 自動終了

# --- 入力イベント ---
event  65  enter
event 130  shoot
event 145  debugKillAll
event 160  quit
event 260  quit

# --- 期待ログエントリ (TC-001 〜 TC-006) ---
# TC-001: アプリケーション起動・正常終了
expect [GAME] Start
# TC-002: タイトルシーン初期化
expect [SCENE] TitleScene started
# TC-003: タイトル → ゲームシーン遷移
expect [INPUT] Enter pressed -> GameScene
expect [SCENE] GameScene started
# TC-004: プレイヤー射撃
expect [INPUT] Player shoot
# TC-005: ゲーム → タイトルシーン遷移
expect [INPUT] Quit pressed -> TitleScene
# TC-006: スコア加算
expect [SCORE] Added
